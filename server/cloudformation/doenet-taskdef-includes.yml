Environment:
  - Name: PORT
    Value: 3000
  - Name: CONFIRM_SIGNIN_URL
    Value: "http://localhost:8000/confirmSignIn"
  - Name: LOGIN_CALLBACK_ROOT
    Value: "http://localhost:8000/"
  - Name: DATABASE_PORT
    Value: 3306
  - Name: SESSION_DATABASE_NAME
    Value: "doenet_session"
  - Name: SESSION_SECRET
    Value: "hi"
  - Name: GOOGLE_CLIENT_ID
    Value: "hi"
  - Name: GOOGLE_CLIENT_SECRET
    Value: "hi"
  - Name: MAGIC_LINK_SECRET
    Value: "hi"
  - Name: DATABASE_HOST
    Value:
      Fn::Sub: "mysql.${EnvironmentName}.doenet.internal"
  - Name: DATABASE_USER
    # ValueFrom:
    # Fn::Sub: "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/DbUser"
    Value: "root"
  - Name: DATABASE_PASSWORD
    # ValueFrom:
    #   Fn::Sub: "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/DbPassword"
    Value: "doenet_password"
  - Name: DATABASE_URL
    Value:
      Fn::Sub: "mysql://root:doenet_password@mysql.${EnvironmentName}.doenet.internal:3306/doenet"
