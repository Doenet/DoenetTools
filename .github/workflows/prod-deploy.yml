name: Prod deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # TEMPORARY TESTING ONLY: remove this push trigger after validating cloudformation.
  push:
    branches: [cloudformation]

permissions:
  contents: read
  id-token: write

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  approve:
    # TEMPORARY TESTING ONLY: remove the cloudformation branch allowance and push-event
    # fallback after validating the prod deploy workflow.
    if: >-
      ${{
        (github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          contains(fromJson('["main","cloudformation"]'), github.event.workflow_run.head_branch)) ||
        (github.event_name == 'push' && github.ref_name == 'cloudformation')
      }}
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Queue prod deploy
        run: echo "Preparing prod deploy for ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

  deploy-backend:
    needs: approve
    uses: ./.github/workflows/reusable-deploy-backend.yml
    with:
      deploy_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      aws_region: us-east-2
      ecr_repository: prod/doenet
      ecs_cluster: prod
      ecs_service: doenet-FARGATE
      gha_role: arn:aws:iam::350646758180:role/github-actions-prod
      sns_topic: arn:aws:sns:us-east-2:350646758180:prod-critical-cloudwatch-notifications
      tag_name: main
    secrets: inherit

  deploy-frontend:
    needs: approve
    uses: ./.github/workflows/reusable-deploy-frontend.yml
    with:
      deploy_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      aws_region: us-east-1
      gha_role: arn:aws:iam::350646758180:role/github-actions-prod
      aws_account_id: "350646758180"
      env_name: prod
      build_mode: prod
    secrets: inherit

  deploy-site:
    needs: approve
    uses: ./.github/workflows/reusable-deploy-site.yml
    with:
      deploy_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      aws_region: us-east-1
      gha_role: arn:aws:iam::350646758180:role/github-actions-prod
      aws_account_id: "350646758180"
      env_name: prod
      build_mode: prod
    secrets: inherit
