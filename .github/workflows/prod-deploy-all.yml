name: Deploy All to Production

on:
  workflow_dispatch:
  push:
    branches: ["*"]

permissions:
  id-token: write
  contents: read

jobs:
  approve:
    runs-on: ubuntu-latest
    environment: production-charles
    steps:
      - name: Approved
        run: echo "Production deployment approved."

  deploy-backend:
    needs: [approve]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      WORKING_DIR: ./
      ECR_REPOSITORY: prod/doenet
      ECS_CLUSTER: prod
      ECS_SERVICE: doenet-FARGATE
      GHA_ROLE: arn:aws:iam::350646758180:role/github-actions-prod
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ env.GHA_ROLE }}
          role-skip-session-tagging: true
          aws-region: ${{ env.AWS_REGION }}

      - name: Sts GetCallerIdentity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image tag
        id: vars
        shell: bash
        run: |
          sha_short=$(git rev-parse --short HEAD)
          date_string=$(date +%Y-%m-%d-%H-%M-%S)
          tag=${date_string}-${sha_short}
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          file: ./apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-to: type=inline

      - name: Update the Doenet ECS Service
        uses: ./.github/actions/update-cluster
        with:
          github-actions-role: ${{ env.GHA_ROLE }}
          role-session-name: doenet-backend-ecs
          aws-region: ${{ env.AWS_REGION }}
          ecs-cluster: ${{ env.ECS_CLUSTER }}
          ecs-service: ${{ env.ECS_SERVICE }}

  deploy-frontend:
    needs: [approve]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      AWS_REGION: us-east-1
      GHA_ROLE: arn:aws:iam::350646758180:role/github-actions-prod
      AWS_ACCOUNT_ID: 350646758180
      DOMAIN: prod.doenet.org
      ENV_NAME: prod
      WORKING_DIR: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ env.GHA_ROLE }}
          role-session-name: app
          aws-region: ${{ env.AWS_REGION }}

      - name: Build the project
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm ci
          cd apps/app
          npm run build

      - name: Sync to S3
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          aws s3 sync --delete apps/app/dist s3://${{ env.ENV_NAME }}-app-${{ env.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}
          id=$(aws ssm get-parameter --name "/${{ env.ENV_NAME }}/app/DistributionId" --query "Parameter.Value" --output text)
          aws cloudfront create-invalidation --distribution-id $id --paths "/"

  deploy-site:
    needs: [approve]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      AWS_REGION: us-east-1
      GHA_ROLE: arn:aws:iam::350646758180:role/github-actions-prod
      AWS_ACCOUNT_ID: 350646758180
      ENV_NAME: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ env.GHA_ROLE }}
          role-session-name: site
          aws-region: ${{ env.AWS_REGION }}

      - name: Build the site
        run: |
          npm ci
          cd apps/web && npm run build

      - name: Sync to S3
        run: |
          aws s3 sync --delete apps/web/dist s3://${{ env.ENV_NAME }}-site-${{ env.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          id=$(aws ssm get-parameter --name "/${{ env.ENV_NAME }}/app/DistributionId" --query "Parameter.Value" --output text)
          aws cloudfront create-invalidation --distribution-id $id --paths "/blog/*" "/_astro/*"
