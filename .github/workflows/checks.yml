name: CI

on:
  push:
    # TODO: remove cloudformation
    branches: ["main", "cloudformation"]
  pull_request:
    branches: ["*"]

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      PORT: 3306
      DATABASE_URL: mysql://root:root@localhost:3306/db

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Setup Node with caching
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Install dependencies once
      - run: npm ci

      # -----------------------------
      # Format check
      # -----------------------------
      - name: Format check
        run: npm run format:check

      # -----------------------------
      # Lint check
      # -----------------------------
      - name: Lint (all)
        run: npm run lint:check

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build
        run: npm run build

      # -----------------------------
      # Start MySQL + Test server
      # -----------------------------
      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS db;" -uroot -proot

      - run: npm run prisma:migrate-dev --workspace @doenet-tools/api
      - run: npm run prisma:seed --workspace @doenet-tools/api

      - name: Test server
        run: npm test --workspace @doenet-tools/api

  # -----------------------------
  # E2E Tests (Grouped)
  # -----------------------------
  e2e-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-group: [group1, group2, group3, group4]

    env:
      DATABASE_URL: mysql://root:root@localhost:3306/db
      # OAuth environment variables for CI (dummy values for testing)
      GOOGLE_CLIENT_ID: ci-test-client-id
      GOOGLE_CLIENT_SECRET: ci-test-client-secret
      GITHUB_CLIENT_ID: ci-test-client-id
      GITHUB_CLIENT_SECRET: ci-test-client-secret
      SESSION_SECRET: ci-test-session-secret
      MAGIC_LINK_SECRET: ci-test-magic-link-secret
      APP_URL: http://localhost:8000
      EMAIL_SES_REGION: us-east-1
      EMAIL_SES_FROM_ADDRESS: noreply@example.com
      MOCK_SIGNIN_EMAIL: "true"
      # Enable test features for CI
      ENABLE_TEST_AUTH_BYPASS: "true"
      ENABLE_TEST_ROUTES: "true"

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Setup Node with caching
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Install dependencies
      - run: npm ci

      # Start MySQL
      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS db;" -uroot -proot

      - run: npm run prisma:migrate-dev --workspace @doenet-tools/api
      - run: npm run prisma:seed --workspace @doenet-tools/api

      - name: Build shared package
        run: npm run build --workspace @doenet-tools/shared

      # Start server in background (port 3000)
      - name: Start server
        run: |
          npm run dev --workspace @doenet-tools/api > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
        env:
          NODE_ENV: development

      # Start client dev server in background (port 8000)
      - name: Start client
        run: |
          npm run dev --workspace @doenet-tools/app > /tmp/client.log 2>&1 &
          echo $! > /tmp/client.pid
        env:
          NODE_ENV: production

      # Wait for servers to be ready
      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000 http://localhost:8000 --timeout 60000

      - name: Check server logs if wait-on fails
        if: failure()
        run: |
          echo "=== Server Log ===" && cat /tmp/server.log || true
          echo "=== Client Log ===" && cat /tmp/client.log || true
          echo "=== Server processes ===" && ps aux | grep "node\|npm" || true

      # Run Cypress e2e tests (grouped)
      - name: Run Cypress e2e tests
        run: npm run test:${{ matrix.test-group }} --workspace @doenet-tools/e2e-tests

      # Upload screenshots and videos on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: packages/e2e-tests/cypress/screenshots
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: packages/e2e-tests/cypress/videos
          if-no-files-found: ignore

  # Separate job for brittle tests
  e2e-brittle-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: mysql://root:root@localhost:3306/db
      GOOGLE_CLIENT_ID: ci-test-client-id
      GOOGLE_CLIENT_SECRET: ci-test-client-secret
      GITHUB_CLIENT_ID: ci-test-client-id
      GITHUB_CLIENT_SECRET: ci-test-client-secret
      SESSION_SECRET: ci-test-session-secret
      MAGIC_LINK_SECRET: ci-test-magic-link-secret
      APP_URL: http://localhost:8000
      EMAIL_SES_REGION: us-east-1
      EMAIL_SES_FROM_ADDRESS: noreply@example.com
      MOCK_SIGNIN_EMAIL: "true"
      ENABLE_TEST_AUTH_BYPASS: "true"
      ENABLE_TEST_ROUTES: "true"

    strategy:
      fail-fast: false
      matrix:
        test-group: [brittle1, brittle2, brittle3]

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Setup Node with caching
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Install dependencies
      - run: npm ci

      # Start MySQL
      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e "CREATE DATABASE IF NOT EXISTS db;" -uroot -proot

      - run: npm run prisma:migrate-dev --workspace @doenet-tools/api
      - run: npm run prisma:seed --workspace @doenet-tools/api

      - name: Build shared package
        run: npm run build --workspace @doenet-tools/shared

      # Start server in background
      - name: Start server
        run: |
          npm run dev --workspace @doenet-tools/api > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
        env:
          NODE_ENV: development

      # Start client dev server in background
      - name: Start client
        run: |
          npm run dev --workspace @doenet-tools/app > /tmp/client.log 2>&1 &
          echo $! > /tmp/client.pid
        env:
          NODE_ENV: production

      # Wait for servers to be ready
      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000 http://localhost:8000 --timeout 60000

      - name: Check server logs if wait-on fails
        if: failure()
        run: |
          echo "=== Server Log ===" && cat /tmp/server.log || true
          echo "=== Client Log ===" && cat /tmp/client.log || true
          echo "=== Server processes ===" && ps aux | grep "node\|npm" || true

      # Run brittle tests with aggressive retry (grouped)
      - name: Run Brittle Tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: npm run test:${{ matrix.test-group }} --workspace @doenet-tools/e2e-tests

      # Upload screenshots and videos on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: brittle-cypress-screenshots
          path: e2e-tests/cypress/screenshots
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: brittle-cypress-videos
          path: e2e-tests/cypress/videos
          if-no-files-found: ignore

  component-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-group: [group1, group2, group3, group4]

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Setup Node with caching
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Install dependencies
      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace @doenet-tools/shared

      # Run component tests (grouped)
      - name: Run component tests
        run: npm run test:${{ matrix.test-group }} --workspace @doenet-tools/app

      # Upload artifacts on failure
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: component-test-artifacts
          path: |
            apps/app/cypress/screenshots/
            apps/app/cypress/videos/
          retention-days: 7
