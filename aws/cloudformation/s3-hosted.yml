AWSTemplateFormatVersion: "2010-09-09"
Description: "S3 website hosting with CloudFront distribution and custom DNS"

Parameters:
  EnvironmentName:
    Type: String
    Description: The environment name (the SSM prefix path name)
    MaxLength: 10

  PublicHostedZoneName:
    Type: String
    Description: The hosted zone name (e.g., example.com)

  PublicHostedZoneId:
    Type: String
    Description: The Route 53 hosted zone ID

  AppServiceName:
    Type: String
    Description: Service name to include in bucket name

  SiteServiceName:
    Type: String
    Description: Service name for the site bucket (e.g., site)
    Default: site

  LoadBalancerDnsName:
    Type: String
    Description: DNS name of the Application Load Balancer

Resources:
  AppBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-${AppServiceName}-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-${SiteServiceName}-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AppOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-${AppServiceName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-${SiteServiceName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AppBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AppBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AppBucket}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${SiteBucket}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  DirectoryIndexFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${EnvironmentName}-site-directory-index"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite directory requests to index.html for Astro static output
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
            var request = event.request;
            var uri = request.uri;
            if (uri.endsWith('/')) {
                request.uri = uri + 'index.html';
            } else if (!uri.split('/').pop().includes('.')) {
                request.uri = uri + '/index.html';
            }
            return request;
        }

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: AppS3Origin
            DomainName: !GetAtt AppBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt AppOriginAccessControl.Id
          - Id: SiteS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
          - Id: ALBOrigin
            DomainName: !Ref LoadBalancerDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Headers:
                - "*"
              Cookies:
                Forward: all
          - PathPattern: /_astro/*
            TargetOriginId: SiteS3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
          - PathPattern: /blog
            TargetOriginId: SiteS3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt DirectoryIndexFunction.FunctionARN
          - PathPattern: /blog/*
            TargetOriginId: SiteS3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt DirectoryIndexFunction.FunctionARN
        DefaultCacheBehavior:
          TargetOriginId: AppS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        Enabled: true
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Aliases:
          - !Ref PublicHostedZoneName
        ViewerCertificate:
          AcmCertificateArn: !Ref SSLCertificate
          SslSupportMethod: sni-only
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-${AppServiceName}-cloudfront"

  SSLCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref PublicHostedZoneName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref PublicHostedZoneName
          HostedZoneId: !Ref PublicHostedZoneId

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PublicHostedZoneId
      Name: !Ref PublicHostedZoneName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  DistributionIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${EnvironmentName}/${AppServiceName}/DistributionId"
      Type: String
      Value: !GetAtt CloudFrontDistribution.Id
      Description: CloudFront distribution ID for the website

Outputs:
  AppBucketName:
    Description: Name of the app S3 bucket
    Value: !Ref AppBucket

  SiteBucketName:
    Description: Name of the site S3 bucket
    Value: !Ref SiteBucket

  WebsiteURL:
    Description: Website URL
    Value: !GetAtt AppBucket.WebsiteURL

  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !GetAtt CloudFrontDistribution.DomainName

  CustomDomainURL:
    Description: Custom domain URL
    Value: !Sub "https://${PublicHostedZoneName}"
