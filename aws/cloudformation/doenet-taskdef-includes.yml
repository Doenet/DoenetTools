Environment:
  - Name: PORT
    Value: 3000
  - Name: APP_URL
    Value: "http://localhost:8000"
  - Name: DATABASE_PORT
    Value: 3306
  - Name: DATABASE_NAME
    Value: "doenet"
  - Name: SESSION_SECRET
    Value: "hi"
  - Name: GOOGLE_CLIENT_ID
    Value: "hi"
  - Name: GOOGLE_CLIENT_SECRET
    Value: "hi"
  - Name: MAGIC_LINK_SECRET
    Value: "hi"
  - Name: DATABASE_HOST
    Value:
      Fn::Sub: "mysql.${EnvironmentName}.doenet.internal"
  - Name: DATABASE_USER
    # ValueFrom:
    # Fn::Sub: "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/DbUser"
    Value: "root"
  - Name: DATABASE_PASSWORD
    # ValueFrom:
    #   Fn::Sub: "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/DbPassword"
    Value: "doenet_password"
  - Name: DATABASE_URL
    Value:
      Fn::Sub: "mysql://root:doenet_password@mysql.${EnvironmentName}.doenet.internal:3306/doenet"
  - Name: EMAIL_SES_FROM_ADDRESS
    Value: "Doenet Accounts <info@mail.doenet.org>"
  - Name: EMAIL_SES_REGION
    Value: "us-east-2"
  - Name: EMAIL_SES_ARN
    Value: "arn:aws:ses:us-east-2:350646758180:identity/mail.doenet.org"
  - Name: NODE_OPTIONS
    Value: "--max-old-space-size=1950"
