AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Instance in an Autoscaling group'
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: General Environment Configuration
      - Label:
          default: EC2 Configuration
        Parameters:
          - EnvironmentName
          - ServiceName
          - SaltServer
          - MinionId
          - InstanceType
          - AmiId
          - VolumeSize
      - Label:
          default: Networking Configuration
        Parameters:
          - VPC
          - SubnetId
          - IpAddress
          - AvailabilityZone
          - AdminSecurityGroup
          - DnsZone
          - HostedZoneId
Parameters:
  EnvironmentName:
    Type: String
    Description: The environment name (the SSM prefix path name)
    Default: opcenter
  ServiceName:
    Type: String
    Description: The primary function of this EC2 instance (PowerDns, Wiki, DuoProxy, etc)
  SaltServer:
    Description: Address of Salt Server
    Type: String
    Default: salt.holycross.edu
  MinionId:
    Type: String
    Description: ex. PowerDns.opcenter.aws
  InstanceType:
    Description: The EC2 instance type
    Type: String
    Default: t3a.medium
  VolumeSize:
    Type: String
    Default: 30
  SubnetId:
    Type : String
    Default: subnet-0cd3714b84710e537 # opcenter VPC private subnet
    Description: The subnet into which the instance should be deployed. Almost always, you'll want to use a private subnet.
  IpAddress:
    Type : String
    Description: An IP Address to use for the instance that is within the SubnetId
  AvailabilityZone:
    Type : String
    Default: us-east-1a
    Description: The AZ of the SubnetId
  VPC:
    Type : 'AWS::SSM::Parameter::Value<String>'
    Default: /opcenter/VPC
  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-02069978db500a511
    Description: "ami-02069978db500a511 -- us-east-1,focal,20.04,amd64,20210511.  Use the Cananical image locator to find official images: https://cloud-images.ubuntu.com/locator/"
#    Description: "ami-0ddbdea833a8d2f0d -- us-east-1,focal,20.04,amd64,20210415.  Use the Cananical image locator to find official images: https://cloud-images.ubuntu.com/locator/"
  AdminSecurityGroup:
    Type : 'AWS::SSM::Parameter::Value<String>'
    Default: /opcenter/AdminSecurityGroup
  DnsZone:
    Description: Route53 hosted zone to use for the database's DNS record (<prefix>.<zone>)
    Type : 'AWS::SSM::Parameter::Value<String>'
    Default: /webdev/VPCHostedZoneName
  HostedZoneId:
    Description: Route53 hosted zone id to use for the database's DNS record
    Type : 'AWS::SSM::Parameter::Value<String>'
    Default: /webdev/VPCHostedZoneId

Resources:

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W9
          - id: W27
          - id: W29
          - id: W5
            reason: Need outbound to the world, all protocols + all ports.
          - id: W42
            reason: Need outbound to the world, all protocols + all ports.
          - id: W40
            reason: Communication with package repos fails
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Enable access to necessary ports
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          SourceSecurityGroupId: !Ref AdminSecurityGroup
          Description: permit all traffic from Admin security group
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: '10.0.0.0/8'
          Description: permit ssh traffic from internal
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: '10.0.0.0/8'
          Description: permit DNS traffic from internal
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: '10.0.0.0/8'
          Description: permit DNS traffic from internal
      SecurityGroupEgress:
        - CidrIp: '0.0.0.0/0'
          IpProtocol: '-1'
          Description: permit all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-${ServiceName}-instance-sg'

  SecurityGroupIngressSelfReference:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: '-1'
      SourceSecurityGroupId: !Ref SecurityGroup
      Description: permit all traffic within the security group

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W3010
    Properties:
      TerminationPolicies:
        - OldestLaunchTemplate
        - OldestInstance
      HealthCheckType: EC2
      AvailabilityZones: 
        - !Ref AvailabilityZone
      MixedInstancesPolicy:
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref LaunchTemplate
            Version: !GetAtt LaunchTemplate.LatestVersionNumber
          Overrides:
          - InstanceType: !Ref InstanceType
      MinSize: '1'
      MaxSize: '1'
      Tags:
        - Key: Name
          Value: !Sub '${ServiceName}-${EnvironmentName}'
          PropagateAtLaunch: true
        - Key: backup
          Value: 30 day single region
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MaxBatchSize: 1
        MinInstancesInService: 0
        MinSuccessfulInstancesPercent: 100
        WaitOnResourceSignals: true
        PauseTime: PT15M

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Metadata:
      AWS::CloudFormation::Authentication:
        S3AccessCreds:
          type: S3
          buckets:
            - !Sub holycross-${EnvironmentName}-salt
          roleName: !Ref EC2Role
      AWS::CloudFormation::Init:
        configSets:
          default:
            - config
        config:
          files:
            /etc/salt/pki/minion/minion.pem:
              source: !Sub https://holycross-${EnvironmentName}-salt.s3.${AWS::Region}.amazonaws.com/${MinionId}.pem
              authentication: S3AccessCreds
              mode: '000600'
              owner: root
              group: root

            /etc/salt/pki/minion/minion.pub:
              source: !Sub https://holycross-${EnvironmentName}-salt.s3.${AWS::Region}.amazonaws.com/${MinionId}.pub
              authentication: S3AccessCreds
              mode: '000600'
              owner: root
              group: root

            /etc/salt/grains:
              source: !Sub https://holycross-${EnvironmentName}-salt.s3.${AWS::Region}.amazonaws.com/${MinionId}.grains
              authentication: S3AccessCreds
              mode: '000644'
              owner: root
              group: root

            /etc/salt/minion:
              content:
                !Sub |
                  master: ${SaltServer}
              mode: '000644'
              owner: root
              group: root

            /etc/salt/minion_id:
              content:
                !Sub |
                  ${MinionId}
              mode: '000644'
              owner: root
              group: root

            /root/launch-config-ubuntu.sh:
              content:
                !Sub |
                  #!/bin/bash -ex
                  echo "Applying states from ${SaltServer}"
                  salt-call state.apply PowerDNS

                  set +e
                  salt-call state.apply AD_Realm,SCOM,AllowUsers
                  exit 0
              mode: '000700'
              owner: root
              group: root

            /etc/cfn/cfn-hup.conf:
              content:
                !Sub |
                  [main]
                  stack=${AWS::StackId}
                  region=${AWS::Region}
                  umask=0
                  verbose=true
                  interval=5
              mode: '000400'
              owner: root
              group: root

            /etc/cfn/hooks.d/cfn-auto-reloader.conf:
              content:
                !Sub |
                  [cfn-auto-reloader-hook]
                  triggers=post.update
                  path=Resources.LaunchTemplate.Metadata.AWS::CloudFormation::Init
                  action=/opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource LaunchTemplate --configsets default --region ${AWS::Region}
                  runas=root
              mode: '000400'
              owner: root
              group: root
            /lib/systemd/system/cfn-hup.service:
              content: |
                 [Unit]
                 Description=cfn-hup daemon

                 [Service]
                 Type=simple
                 ExecStart=/opt/aws/bin/cfn-hup
                 Restart=always

                 [Install]
                 WantedBy=multi-user.target
              mode: '000400'
              owner: root
              group: root

          commands:
            01_run_launch_config:
              command: /root/launch-config-ubuntu.sh
              cwd: /root
            02_enable_cfn_hup:
              command: systemctl enable cfn-hup.service
            03_start_cfn_hup:
              command: systemctl start cfn-hup.service
          packages:
            apt:
              salt-minion: []

    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId 
        IamInstanceProfile: 
          Name: !Ref EC2InstanceProfile
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              DeleteOnTermination: true
              VolumeSize: !Ref VolumeSize
              VolumeType: gp2
        NetworkInterfaces:
          - NetworkInterfaceId: !Ref EniForFixedIp
            DeviceIndex: 0
        UserData: 
          Fn::Base64:
            !Sub |
              #!/bin/bash -xe
              curl -fsSL https://packages.broadcom.com/artifactory/api/security/keypair/SaltProjectKey/public | sudo tee /etc/apt/keyrings/salt-archive-keyring.pgp
              # Create apt repo target configuration
              curl -fsSL https://github.com/saltstack/salt-install-guide/releases/latest/download/salt.sources | sudo tee /etc/apt/sources.list.d/salt.sources

              apt-get update
              installPkgs() {
                  apt-get install -y python3 python3-setuptools python3-virtualenv python3-pip python-is-python3 unzip
              }
              # unattended upgrades may be running at time of cloud init
              # which will cause init to fail, so we try to avoid it by 
              # disabling unattended upgrades and also sleeping for 60 seconds
              # if a dpkg happened to still be running
              systemctl stop unattended-upgrades.service
              installPkgs || sleep 60 && installPkgs 
              systemctl start unattended-upgrades.service

              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip
              ./aws/install

              virtualenv /opt/aws/virtualvenv
              source /opt/aws/virtualvenv/bin/activate
              pip install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz

              export PATH=/opt/aws/bin:$PATH
              cfn-init -v --configsets=default \
                  --region ${AWS::Region} --stack ${AWS::StackName} \
                  --resource LaunchTemplate
              cfn-signal -e $? --stack ${AWS::StackName} --resource AutoScalingGroup 

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: get-minion-credentials
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::holycross-${EnvironmentName}-salt/${MinionId}*"
        - PolicyName: signal-waitcondition
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: cloudformation:SignalResource
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  EniForFixedIp:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-${ServiceName}-eni-zone-a'
      SubnetId: !Ref SubnetId
      PrivateIpAddress: !Ref IpAddress
      GroupSet: 
        - !Ref SecurityGroup

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Comment: DB
      Name: !Sub '${ServiceName}.${DnsZone}'
      Type: A
      TTL: 60
      ResourceRecords:
        - !Ref IpAddress
