# Default Locust configuration for Doenet load tests.
# Run all personas with: locust --config load-testing/locust.conf
# Or simply: locust   (when run from the load-testing/ directory)

locustfile = load-testing/guest.py,load-testing/student_anonymous.py,load-testing/student.py,load-testing/instructor.py,load-testing/author.py
host = https://dev3.doenet.org
users = 100
spawn-rate = 10