services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DATABASE_NAME:-doenet}
      MYSQL_USER: ${DATABASE_USER:-myuser}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-mypassword}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs/mysql:/docker-entrypoint-initdb.d

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h localhost -uroot -p"$$MYSQL_ROOT_PASSWORD"',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
